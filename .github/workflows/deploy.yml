name: 'Terraform Deploy'

on:
  workflow_dispatch: # ¡ESTO ES LO QUE HABILITA EL BOTÓN MANUAL!
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    defaults:
      run:
        working-directory: ./infra

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Instalar Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Plan
      run: terraform plan -var="prefix=e2" -var="location=eastus"

    - name: Terraform Apply
      # Como es manual, permitimos que aplique los cambios
      run: terraform apply -auto-approve -var="prefix=e2" -var="location=eastus"
