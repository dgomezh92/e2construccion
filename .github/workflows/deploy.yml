name: 'Terraform Deploy'

on:
  workflow_dispatch: # ¡ESTO ES LO QUE HABILITA EL BOTÓN MANUAL!
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Instalar Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Plan
      run: terraform plan -var="prefix=e4" -var="location=centralus"

    - name: Terraform Apply
      # Como es manual, permitimos que aplique los cambios
      run: terraform apply -auto-approve -var="prefix=e4" -var="location=centralus"
